<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 欢乐斗地主 - Vercel版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a5f1a 0%, #0d3d0d 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
        }
        .input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
        }
        .input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .room-list {
            display: grid;
            gap: 10px;
        }
        .room-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .room-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .room-info h4 {
            margin-bottom: 5px;
        }
        .room-info span {
            font-size: 14px;
            opacity: 0.7;
        }
        .players {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .player {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .player.ready {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }
        .player.current {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
        }
        .messages {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .message {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .message:last-child {
            border-bottom: none;
        }
        .message .user {
            font-weight: bold;
            color: #f59e0b;
        }
        .hidden {
            display: none !important;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 欢乐斗地主</h1>
            <p>Vercel HTTP轮询版</p>
        </div>

        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">已连接</span>
            </div>
            <div id="playerInfo"></div>
        </div>

        <!-- 登录/注册 -->
        <div id="loginSection" class="card">
            <h3>👋 欢迎来到斗地主</h3>
            <input type="text" id="usernameInput" class="input" placeholder="输入你的昵称" maxlength="12">
            <button class="btn" onclick="game.login()">进入游戏</button>
        </div>

        <!-- 大厅 -->
        <div id="lobbySection" class="card hidden">
            <h3>🏠 游戏大厅</h3>
            <div style="margin-bottom: 15px;">
                <button class="btn" onclick="game.showCreateRoom()">创建房间</button>
                <button class="btn btn-secondary" onclick="game.refreshRooms()">刷新列表</button>
            </div>
            <div id="roomList" class="room-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 创建房间 -->
        <div id="createRoomSection" class="card hidden">
            <h3>🏗️ 创建房间</h3>
            <input type="text" id="roomNameInput" class="input" placeholder="房间名称">
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="privateRoom"> 私密房间
            </label>
            <button class="btn" onclick="game.createRoom()">创建</button>
            <button class="btn btn-secondary" onclick="game.showLobby()">返回</button>
        </div>

        <!-- 房间内 -->
        <div id="roomSection" class="card hidden">
            <h3 id="roomTitle">房间</h3>
            <div id="playersList" class="players"></div>
            <div id="roomActions" style="margin-top: 15px;">
                <button class="btn" id="readyBtn" onclick="game.toggleReady()">准备</button>
                <button class="btn" id="startBtn" onclick="game.startGame()" style="display:none;">开始游戏</button>
                <button class="btn btn-secondary" onclick="game.leaveRoom()">离开房间</button>
            </div>
            <div id="gameArea" style="display:none; margin-top: 20px;">
                <p>游戏进行中...</p>
            </div>
            <div class="messages" id="messages"></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="messageInput" class="input" placeholder="发送消息..." style="margin-bottom: 0;">
                <button class="btn" onclick="game.sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // API 基础地址 - Vercel 会自动配置
        const API_BASE = window.location.origin + '/api';
        
        // 游戏状态
        const game = {
            username: '',
            playerId: '',
            roomId: '',
            isHost: false,
            isReady: false,
            lastUpdate: 0,
            pollingInterval: null,
            
            // 登录
            async login() {
                const username = document.getElementById('usernameInput').value.trim();
                if (!username) {
                    alert('请输入昵称');
                    return;
                }
                
                this.username = username;
                this.playerId = Date.now().toString();
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('lobbySection').classList.remove('hidden');
                document.getElementById('playerInfo').textContent = `玩家: ${username}`;
                
                await this.refreshRooms();
                this.startPolling();
            },
            
            // 获取房间列表
            async refreshRooms() {
                try {
                    const response = await fetch(`${API_BASE}/listRooms`);
                    const data = await response.json();
                    
                    if (data.success) {
                        this.renderRoomList(data.rooms);
                    }
                } catch (error) {
                    console.error('获取房间列表失败:', error);
                }
            },
            
            // 渲染房间列表
            renderRoomList(rooms) {
                const container = document.getElementById('roomList');
                
                if (!rooms || rooms.length === 0) {
                    container.innerHTML = '<p style="text-align:center;opacity:0.7;">暂无房间，创建一个吧！</p>';
                    return;
                }
                
                container.innerHTML = rooms.map(room => `
                    <div class="room-item" onclick="game.joinRoom('${room.id}')">
                        <div class="room-info">
                            <h4>${room.name}</h4>
                            <span>${room.playerCount}/3 人</span>
                        </div>
                        <span class="btn btn-secondary">加入</span>
                    </div>
                `).join('');
            },
            
            // 显示创建房间
            showCreateRoom() {
                document.getElementById('lobbySection').classList.add('hidden');
                document.getElementById('createRoomSection').classList.remove('hidden');
            },
            
            // 显示大厅
            showLobby() {
                document.getElementById('createRoomSection').classList.add('hidden');
                document.getElementById('roomSection').classList.add('hidden');
                document.getElementById('lobbySection').classList.remove('hidden');
                this.roomId = '';
                this.refreshRooms();
            },
            
            // 创建房间
            async createRoom() {
                const roomName = document.getElementById('roomNameInput').value.trim();
                const isPrivate = document.getElementById('privateRoom').checked;
                
                try {
                    const response = await fetch(`${API_BASE}/createRoom`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            roomName: roomName || undefined,
                            username: this.username,
                            isPrivate
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.roomId = data.roomId;
                        this.isHost = true;
                        this.enterRoom(data.room);
                    }
                } catch (error) {
                    console.error('创建房间失败:', error);
                    alert('创建房间失败，请重试');
                }
            },
            
            // 加入房间
            async joinRoom(roomId) {
                try {
                    const response = await fetch(`${API_BASE}/joinRoom`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            roomId,
                            username: this.username
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.playerId = data.playerId;
                        this.roomId = roomId;
                        this.isHost = false;
                        this.enterRoom(data.room);
                    } else {
                        alert(data.message || '加入房间失败');
                    }
                } catch (error) {
                    console.error('加入房间失败:', error);
                    alert('加入房间失败，请重试');
                }
            },
            
            // 进入房间
            enterRoom(room) {
                document.getElementById('createRoomSection').classList.add('hidden');
                document.getElementById('lobbySection').classList.add('hidden');
                document.getElementById('roomSection').classList.remove('hidden');
                document.getElementById('roomTitle').textContent = room.name;
                
                this.updateRoomUI(room);
            },
            
            // 更新房间UI
            updateRoomUI(room) {
                const container = document.getElementById('playersList');
                const isPlayer = room.players.some(p => p.id === this.playerId);
                const me = room.players.find(p => p.id === this.playerId);
                
                this.isReady = me?.ready || false;
                this.isHost = me?.isHost || false;
                
                container.innerHTML = room.players.map((player, index) => `
                    <div class="player ${player.ready ? 'ready' : ''} ${index === 0 ? 'current' : ''}">
                        <div>${player.username}</div>
                        <div style="font-size: 12px; opacity: 0.7;">
                            ${player.isHost ? '👑 房主' : ''}
                            ${player.ready ? '✅ 已准备' : '⏳ 未准备'}
                        </div>
                    </div>
                `).join('');
                
                // 更新按钮
                const readyBtn = document.getElementById('readyBtn');
                const startBtn = document.getElementById('startBtn');
                
                if (this.isHost) {
                    readyBtn.style.display = 'none';
                    startBtn.style.display = 'inline-block';
                    startBtn.disabled = room.players.length < 3 || !room.players.every(p => p.ready);
                } else {
                    readyBtn.style.display = 'inline-block';
                    readyBtn.textContent = this.isReady ? '取消准备' : '准备';
                    startBtn.style.display = 'none';
                }
                
                // 显示消息
                this.renderMessages(room.messages || []);
            },
            
            // 切换准备状态
            async toggleReady() {
                try {
                    const response = await fetch(`${API_BASE}/ready`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            roomId: this.roomId,
                            playerId: this.playerId,
                            ready: !this.isReady
                        })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        this.isReady = !this.isReady;
                        this.updateRoomUI(data.room);
                    }
                } catch (error) {
                    console.error('准备失败:', error);
                }
            },
            
            // 开始游戏
            async startGame() {
                try {
                    const response = await fetch(`${API_BASE}/startGame`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomId: this.roomId })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        document.getElementById('gameArea').style.display = 'block';
                        this.updateRoomUI(data.room);
                    } else {
                        alert(data.message);
                    }
                } catch (error) {
                    console.error('开始游戏失败:', error);
                }
            },
            
            // 离开房间
            async leaveRoom() {
                if (this.roomId) {
                    try {
                        await fetch(`${API_BASE}/leaveRoom`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                roomId: this.roomId,
                                playerId: this.playerId
                            })
                        });
                    } catch (error) {
                        console.error('离开房间失败:', error);
                    }
                }
                
                this.showLobby();
            },
            
            // 发送消息
            async sendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                
                if (!message) return;
                
                try {
                    await fetch(`${API_BASE}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            roomId: this.roomId,
                            playerId: this.playerId,
                            message
                        })
                    });
                    
                    input.value = '';
                } catch (error) {
                    console.error('发送消息失败:', error);
                }
            },
            
            // 渲染消息
            renderMessages(messages) {
                const container = document.getElementById('messages');
                container.innerHTML = messages.map(msg => `
                    <div class="message">
                        <span class="user">${msg.username}:</span>
                        <span>${msg.message}</span>
                    </div>
                `).join('');
                
                // 滚动到底部
                container.scrollTop = container.scrollHeight;
            },
            
            // 开始轮询
            startPolling() {
                if (this.pollingInterval) {
                    clearInterval(this.pollingInterval);
                }
                
                this.pollingInterval = setInterval(() => {
                    this.pollUpdate();
                }, 1000); // 每秒轮询一次
            },
            
            // 轮询更新
            async pollUpdate() {
                if (!this.roomId) {
                    // 在大厅，刷新房间列表
                    if (!document.getElementById('lobbySection').classList.contains('hidden')) {
                        await this.refreshRooms();
                    }
                    return;
                }
                
                // 在房间，获取房间状态
                try {
                    const response = await fetch(
                        `${API_BASE}/getGameState?roomId=${this.roomId}&lastUpdate=${this.lastUpdate}`
                    );
                    const data = await response.json();
                    
                    if (data.success && data.hasUpdate) {
                        this.lastUpdate = data.room.lastUpdate;
                        this.updateRoomUI(data.room);
                    }
                } catch (error) {
                    console.error('轮询失败:', error);
                    document.getElementById('statusDot').classList.add('disconnected');
                    document.getElementById('statusText').textContent = '连接中断';
                }
            },
            
            // 回车发送消息
            init() {
                document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.sendMessage();
                    }
                });
            }
        };
        
        // 初始化
        game.init();
    </script>
</body>
</html>
